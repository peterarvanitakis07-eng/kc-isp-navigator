name: Monthly FCC Data Check

on:
  schedule:
    # Runs at 9:00 AM CT on the 1st of every month
    - cron: '0 14 1 * *'
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  issues: write
  contents: read

jobs:
  check-fcc-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Check FCC data freshness
        run: |
          echo "FCC Broadband Data Collection releases new data ~twice per year."
          echo "Current data in tool: March 2026"
          echo "Check https://broadbandmap.fcc.gov/data-download for newer releases."

          # Fetch the FCC data download page to check for updates
          curl -s "https://broadbandmap.fcc.gov/data-download" | grep -o 'Jun [0-9]* 202[0-9]\|Dec [0-9]* 202[0-9]\|Mar [0-9]* 202[0-9]' | head -5 || true

          echo ""
          echo "To update the block_isp_lookup.json:"
          echo "1. Download new FCC bulk fixed broadband availability data"
          echo "2. Run: python3 scripts/build_block_lookup.py"
          echo "3. Commit the new block_isp_lookup.json"
          echo "4. Update the data date in index.html (search for 'March 2026')"

      - name: Notify via issue if stale
        uses: actions/github-script@v7
        with:
          script: |
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'fcc-data-check',
              state: 'open'
            });
            if (issues.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Monthly FCC data check — ${new Date().toLocaleString('en-US', {month:'long', year:'numeric'})}`,
                body: `## Monthly FCC Data Check\n\nThis issue is created automatically on the 1st of each month.\n\n**Action needed:** Check if FCC has released newer broadband availability data at https://broadbandmap.fcc.gov/data-download\n\nCurrent data in tool: **March 2026**\n\nIf newer data is available:\n1. Download the fixed broadband availability bulk data\n2. Run \`python3 scripts/build_block_lookup.py\`\n3. Commit updated \`block_isp_lookup.json\`\n4. Update date references in \`index.html\`\n5. Close this issue\n\n_Auto-generated by monthly FCC data check workflow_`,
                labels: ['fcc-data-check']
              });
            }
