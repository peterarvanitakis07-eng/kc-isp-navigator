name: Monthly Lighthouse Audit

on:
  schedule:
    # Runs at 10:00 AM CT on the 1st of every month (after FCC check at 9 AM)
    - cron: '0 15 1 * *'
  workflow_dispatch:   # allow manual run from GitHub Actions tab

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Run Lighthouse audit
        uses: treosh/lighthouse-ci-action@v11
        id: lighthouse
        with:
          urls: |
            https://peterarvanitakis07-eng.github.io/kc-isp-navigator/
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: '.github/lighthouserc.json'

      - name: Post results as a GitHub issue comment / new issue
        uses: actions/github-script@v7
        with:
          script: |
            const results = ${{ steps.lighthouse.outputs.manifest }};
            if (!results || !results.length) {
              console.log('No Lighthouse results found.');
              return;
            }
            const r = results[0].summary;
            const perf        = Math.round((r.performance        ?? 0) * 100);
            const access      = Math.round((r.accessibility      ?? 0) * 100);
            const bestPract   = Math.round((r['best-practices']  ?? 0) * 100);
            const seo         = Math.round((r.seo                ?? 0) * 100);

            const emoji = score => score >= 90 ? '🟢' : score >= 70 ? '🟡' : '🔴';

            const body = [
              `## 🔦 Monthly Lighthouse Audit — ${new Date().toLocaleString('en-US', {month:'long', year:'numeric'})}`,
              '',
              `| Category | Score | |`,
              `|---|---|---|`,
              `| Performance    | ${perf}  | ${emoji(perf)} |`,
              `| Accessibility  | ${access}| ${emoji(access)} |`,
              `| Best Practices | ${bestPract}| ${emoji(bestPract)} |`,
              `| SEO            | ${seo}   | ${emoji(seo)} |`,
              '',
              `📄 [Full report](${results[0].htmlPath || 'https://peterarvanitakis07-eng.github.io/kc-isp-navigator/'})`,
              '',
              `_Auto-generated by monthly Lighthouse audit workflow_`,
            ].join('\n');

            // Check for an open Lighthouse issue this month
            const monthKey = new Date().toLocaleString('en-US', {month:'long', year:'numeric'});
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'lighthouse',
              state: 'open',
            });

            const existing = issues.find(i => i.title.includes(monthKey));
            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: `Lighthouse audit — ${monthKey}`,
                body,
                labels: ['lighthouse'],
              });
            }
